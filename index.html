<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal Video Downloader</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Download Videos From Any Platform Instantly</h1>
    <p>Paste a link and get your video in seconds</p>

    <input id="urlInput" type="text" placeholder="Paste video link here">

    <select id="formatSelect">
      <option value="mp4">HD / SD Video</option>
      <option value="mp3">Audio MP3</option>
    </select>

    <button id="downloadBtn">Download</button>

    <div id="status"></div>
  </div>

<script src="script.js"></script>
</body>
</html>
